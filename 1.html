<!DOCTYPE html>
<html>
<head>
    <title>Calculator By Arhan</title>

    <script src="cal.js"></script>

    <style>
        body {
            background-color: #fde68a;   /* peach / light yellow bg */
            height: 100vh;
            display:flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .calculator {
            background-color: #fff7ed;
            padding: 18px;
            width: 280px;
            border-radius: 10px;
            border: 2px solid #444;
        }

        h1 {
            text-align: center;
            font-size: 20px;
            color: #0f766e;
            margin-bottom: 10px;
        }

        input[type="text"] {
            width: 100%;
            height: 40px;
            background-color: #e0f2f1;
            border: 1px solid #444;
            font-size: 18px;
            text-align: right;
            padding-right: 6px;
            color: #000;
        }

        table {
            width: 100%;
            margin-top: 10px;
        }

        input[type="button"] {
            width: 100%;
            height: 36px;
            font-size: 16px;
            border: 1px solid #444;
            background-color: #fef9c3;   /* number buttons */
            cursor: pointer;
        }

        .operator {
            background-color: #99f6e4;   /* teal */
        }

        .clear {
            background-color: #fdba74;   /* orange */
        }

        .equal {
            background-color: #86efac;   /* green */
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="calculator">
    <h1>Calculator</h1>

    <table>
        <tr>
            <td colspan="3">
                <input type="text" id="result">
            </td>
            <td>
                <input type="button" value="C" class="clear" onclick="clr()">
            </td>
        </tr>

        <tr>
            <td><input type="button" value="1" onclick="dis('1')"></td>
            <td><input type="button" value="2" onclick="dis('2')"></td>
            <td><input type="button" value="3" onclick="dis('3')"></td>
            <td><input type="button" value="/" class="operator" onclick="dis('/')"></td>
        </tr>

        <tr>
            <td><input type="button" value="4" onclick="dis('4')"></td>
            <td><input type="button" value="5" onclick="dis('5')"></td>
            <td><input type="button" value="6" onclick="dis('6')"></td>
            <td><input type="button" value="-" class="operator" onclick="dis('-')"></td>
        </tr>

        <tr>
            <td><input type="button" value="7" onclick="dis('7')"></td>
            <td><input type="button" value="8" onclick="dis('8')"></td>
            <td><input type="button" value="9" onclick="dis('9')"></td>
            <td><input type="button" value="+" class="operator" onclick="dis('+')"></td>
        </tr>

        <tr>
            <td><input type="button" value="." onclick="dis('.')"></td>
            <td><input type="button" value="0" onclick="dis('0')"></td>
            <td><input type="button" value="=" class="equal" onclick="solve()"></td>
            <td><input type="button" value="*" class="operator" onclick="dis('*')"></td>
        </tr>
    </table>
</div>

</body>
</html>
